version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nautical-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nautical_user
      POSTGRES_PASSWORD: nautical_pass
      POSTGRES_DB: nautical_carpentry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nautical_user -d nautical_carpentry"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nautical-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://nautical_user:nautical_pass@postgres:5432/nautical_carpentry
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/src:/app/src:ro  # For development hot-reload
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  # Frontend (Vite dev server for development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nautical-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      VITE_API_URL: http://backend:3001
    volumes:
      - ./frontend/src:/app/src:ro  # For development hot-reload
      - ./frontend/public:/app/public:ro
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
    driver: local
