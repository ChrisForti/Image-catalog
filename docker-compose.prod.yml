version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nautical-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nautical_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nautical_pass}
      POSTGRES_DB: ${POSTGRES_DB:-nautical_carpentry}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nautical_user} -d ${POSTGRES_DB:-nautical_carpentry}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Production Build)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: nautical-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-nautical_user}:${POSTGRES_PASSWORD:-nautical_pass}@postgres:5432/${POSTGRES_DB:-nautical_carpentry}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend (Nginx serving production build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: nautical-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
